  services:
    db:
      image: pgvector/pgvector:pg16
      environment:
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres
        POSTGRES_DB: qnadb
      ports:
        - "5432:5432"
      volumes:
        - pgdata:/var/lib/postgresql/data

    backend:
      build: ./backend
      ports:
        - "8000:8000"
      environment:
        - DATABASE_URL=postgresql://postgres:postgres@db:5432/qnadb
        - OPENAI_API_KEY=${OPENAI_API_KEY}
      depends_on:
        - db

    frontend:
      build: ./frontend
      ports:
        - "80:80"
      environment:
        - REACT_APP_API_URL=http://localhost:8000


